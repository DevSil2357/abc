<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store | ร้านค้าออนไลน์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">MYSTORE</h1>
            <div class="space-x-6 hidden md:flex">
                <a href="#" class="hover:text-indigo-600">หน้าแรก</a>
                <a href="#" class="hover:text-indigo-600">สินค้าทั้งหมด</a>
                <a href="#" class="hover:text-indigo-600">โปรโมชั่น</a>
            </div>
            <div class="flex items-center space-x-4 text-xl">
                <i class="fa-solid fa-magnifying-glass cursor-pointer hover:text-indigo-600"></i>
                <i class="fa-solid fa-cart-shopping cursor-pointer hover:text-indigo-600"></i>
                <i class="fa-solid fa-user cursor-pointer hover:text-indigo-600"></i>
            </div>
        </div>
    </nav>

    <header class="bg-indigo-600 py-16 px-4 text-center text-white">
        <h2 class="text-4xl md:text-6xl font-bold mb-4">ยินดีต้อนรับสู่ร้านค้าใหม่ของเรา</h2>
        <p class="text-lg opacity-90 mb-8">สินค้าคุณภาพดี ราคาคุ้มค่า พร้อมส่งตรงถึงหน้าบ้านคุณ</p>
        <button class="bg-white text-indigo-600 px-8 py-3 rounded-full font-bold hover:bg-gray-100 transition">ช้อปเลย</button>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h3 class="text-2xl font-bold mb-8 border-l-4 border-indigo-600 pl-4">สินค้าแนะนำ</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden group">
                <div class="h-64 bg-gray-200 overflow-hidden flex items-center justify-center p-4">
                    <img src="https://i5.walmartimages.com/seo/Disney-Pixar-Toy-Story-Buzz-Lightyear-Talking-Action-Figure_11123c59-f8b1-4483-bb77-c31a7b2a9b75_1.dd0c2d86b361071a7a810bd23af41f22.jpeg" alt="Buzz Lightyear Talking Action Figure" class="max-w-full max-h-full object-contain group-hover:scale-105 transition">
                </div>
                <div class="p-4">
                    <p class="text-gray-500 text-sm mb-1">โมเดลและฟิกเกอร์</p>
                    <h4 class="font-bold text-lg mb-2">หุ่นยนต์ Buzz Lightyear พูดได้ - Toy Story</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-indigo-600 font-bold text-xl">฿1,890</span>
                        <button class="bg-gray-900 text-white p-2 rounded-lg hover:bg-indigo-600 transition">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
            </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 px-4 mt-20">
        <div class="max-w-7xl mx-auto text-center">
            <h3 class="text-2xl font-bold mb-4">รับข่าวสารและส่วนลดพิเศษ</h3>
            <div class="max-w-md mx-auto flex gap-2">
                <input type="email" placeholder="กรอกอีเมลของคุณ" class="flex-1 px-4 py-2 rounded-lg text-black outline-none">
                <button class="bg-indigo-600 px-6 py-2 rounded-lg hover:bg-indigo-500 transition">ติดตาม</button>
            </div>
            <p class="mt-8 text-gray-400 text-sm">© 2026 MyStore. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
